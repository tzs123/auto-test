name: pytest allure report


on:

  workflow_dispatch:

  push:
    branches:
      - main


concurrency:

  group: pytest

  cancel-in-progress: true



jobs:


  test:


    runs-on: self-hosted



    steps:


    - name: Checkout
      uses: actions/checkout@v4



    - name: Check Python
      run: |
        python3 --version
        pip3 --version



    - name: Install dependencies
      run: |
        pip3 install -r requirements.txt



    - name: Install playwright
      run: |
        playwright install chromium



    - name: Run Test
      continue-on-error: true
      run: |
        chmod +x run.sh
        ./run.sh



    - name: Check Allure Report
      if: always()
      run: |

        ls -la reports

        ls -la reports/allure-report



    - name: Upload allure report
      if: always()
      uses: actions/upload-artifact@v4

      with:

        name: allure-report

        path: reports/allure-report


    - name: Check Allure
      if: always()
      run: |

        pwd

        ls -la

        echo "==== reports ===="

        ls -la reports

        echo "==== allure ===="

        ls -la reports/allure-report


    - name: Deploy Allure Report
      if: always()
      uses: peaceiris/actions-gh-pages@v4

      with:

        github_token: ${{ secrets.GITHUB_TOKEN }}

        publish_dir: reports/allure-report

        publish_branch: gh-pages
        force_orphan: true


    - name: Upload failed videos
      if: failure()

      uses: actions/upload-artifact@v4

      with:

        name: playwright-video

        path: test-results/



    - name: Send Feishu Message
      if: always()

      run: |

        curl \
        -X POST \
        -H "Content-Type: application/json" \
        \
        -d '
        {
          "msg_type":"text",
          "content":{
             "text":
             "自动化测试完成\n\nAllure报告:\nhttps://tzs123.github.io/auto-test/"
          }
        }
        ' \
        ${{ secrets.FEISHU_WEBHOOK }}
