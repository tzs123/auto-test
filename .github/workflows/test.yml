name: pytest allure report


on:
  workflow_dispatch:

  push:
    branches:
      - main


concurrency:
  group: pytest
  cancel-in-progress: true


jobs:

  test:

    runs-on: self-hosted


    steps:


    # =========================
    # 1. 拉取代码
    # =========================
    - name: Checkout
      uses: actions/checkout@v4



    # =========================
    # 2. Python环境
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"



    # =========================
    # 3. 环境检查
    # =========================
    - name: Check Environment
      run: |
        echo "====== Python ======"
        which python3
        python3 --version

        echo "====== Pip ======"
        pip3 --version

        echo "====== Allure ======"
        allure --version



    # =========================
    # 4. 安装依赖
    # =========================
    - name: Install dependencies
      run: |
        pip3 install -r requirements.txt



    # =========================
    # 5. 安装 Playwright
    # =========================
    - name: Install Playwright
      run: |
        playwright install chromium



    # =========================
    # 6. 执行测试
    # =========================
    - name: Run Test
      continue-on-error: true
      run: |

        rm -rf allure-results
        mkdir allure-results


        pytest \
        --alluredir=allure-results



        echo "====== Allure Result Files ======"

        ls -la allure-results



    # =========================
    # 7. 生成Allure报告
    # =========================
    - name: Generate Allure Report
      if: always()
      run: |

        rm -rf reports

        mkdir -p reports


        allure generate \
        allure-results \
        -o reports/allure-report \
        --clean



    # =========================
    # 8. 检查报告
    # =========================
    - name: Check Allure Report
      if: always()
      run: |

        echo "====== Report ======"

        ls -la reports

        echo "====== HTML ======"

        find reports/allure-report -maxdepth 2 -type f | head -20



    # =========================
    # 9. 保存Artifact
    # =========================
    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:

        name: allure-report

        path: reports/allure-report

        retention-days: 7



    # =========================
    # 10. 发布GitHub Pages
    # =========================
    - name: Deploy Allure Report
      if: always()
      uses: peaceiris/actions-gh-pages@v4

      with:

        github_token: ${{ secrets.GITHUB_TOKEN }}

        publish_dir: reports/allure-report

        publish_branch: gh-pages
