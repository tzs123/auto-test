name: pytest allure report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"


jobs:

  test:

    #runs-on: ubuntu-latest
    runs-on: self-hosted
      
    steps:

    # 拉代码
    - name: Checkout
      uses: actions/checkout@v4


    # Python环境
    #- name: Setup Python
      #uses: actions/setup-python@v5
      #with:
        #python-version: "3.11"


    # Python环境检查
    - name: Check Python
      run: |
        python3 --version
        pip3 --version


    # 安装依赖
    - name: Install dependencies
      run: |
        pip3 install -r requirements.txt


    # 安装 Playwright 浏览器
    - name: Install playwright
      run: |
        playwright install chromium


    # 执行自动化
    - name: Run Test
      run: |
        chmod +x run.sh
        ./run.sh


    # 保存Allure结果
    - name: Upload allure results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: reports/allure-results
