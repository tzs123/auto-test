name: pytest allure report


on:

  workflow_dispatch:

  push:
    branches:
      - main



concurrency:

  group: pytest

  cancel-in-progress: true



jobs:


  test:


    runs-on: self-hosted


    steps:


    # =========================
    # 拉代码
    # =========================

    - name: Checkout
      uses: actions/checkout@v4



    # =========================
    # Python环境
    # =========================

    - name: Check Python

      run:

        python3 --version
        pip3 --version



    # =========================
    # 安装依赖
    # =========================

    - name: Install dependencies

      run:

        pip3 install -r requirements.txt



    # =========================
    # Playwright
    # =========================

    - name: Install playwright

      run:

        playwright install chromium



    # =========================
    # 执行测试
    # =========================

    - name: Run Test

      continue-on-error: true

      run:

        chmod +x run.sh

        ./run.sh



    # =========================
    # 生成Allure报告
    # =========================

    - name: Generate Allure Report

      if: always()

      run:

        mkdir -p reports/allure-report


        allure generate \
        reports/allure-results \
        -o reports/allure-report \
        --clean



    # =========================
    # 生成测试统计
    # =========================

    - name: Generate Test Summary

      if: always()

      run:

        python3 utils/allure_summary.py


        echo "===== summary ====="


        cat reports/summary.json



    # =========================
    # 发布Allure到Pages
    # =========================

    - name: Deploy Allure Report

      if: always()

      uses: peaceiris/actions-gh-pages@v4


      with:

        github_token: ${{ secrets.GITHUB_TOKEN }}

        publish_dir: reports/allure-report

        publish_branch: gh-pages

        keep_files: false



    # =========================
    # 上传报告
    # =========================

    - name: Upload Allure Report

      if: always()

      uses: actions/upload-artifact@v4


      with:

        name: allure-report

        path: reports/allure-report



    # =========================
    # 飞书通知
    # =========================

    - name: Send Feishu Message

      if: always()


      run: |


        PROJECT=$(jq -r '.project' reports/summary.json)

        STATUS=$(jq -r '.status' reports/summary.json)

        RATE=$(jq -r '.rate' reports/summary.json)

        TOTAL=$(jq -r '.total' reports/summary.json)

        PASSED=$(jq -r '.passed' reports/summary.json)

        FAILED=$(jq -r '.failed' reports/summary.json)

        SKIPPED=$(jq -r '.skipped' reports/summary.json)

        DURATION=$(jq -r '.duration' reports/summary.json)

        START=$(jq -r '.start_time' reports/summary.json)

        END=$(jq -r '.end_time' reports/summary.json)



        curl \
        -X POST \
        -H "Content-Type: application/json" \
        -d '
{
 "msg_type":"interactive",

 "card":{

   "config":{
     "wide_screen_mode":true
   },


   "header":{

     "template":"red",

     "title":{

       "tag":"plain_text",

       "content":"🚀 自动化测试完成"

     }

   },


   "elements":[


     {

       "tag":"div",

       "text":{

         "tag":"lark_md",

         "content":
"**项目：** '"$PROJECT"'\n\n**状态：** '"$STATUS"'\n\n**通过率：** '"$RATE"'\n\n**总计：** '"$TOTAL"'\n\n**通过：** '"$PASSED"'\n\n**失败：** '"$FAILED"'\n\n**跳过：** '"$SKIPPED"'\n\n**耗时：** '"$DURATION"'\n\n**开始时间：** '"$START"'\n\n**结束时间：** '"$END"'"

       }

     },


     {

       "tag":"action",

       "actions":[


         {

           "tag":"button",

           "type":"primary",


           "text":{

             "tag":"plain_text",

             "content":"📊 查看 Allure 报告"

           },


           "url":

           "https://tzs123.github.io/auto-test/"

         }


       ]

     }


   ]

 }

}
' \
${{ secrets.FEISHU_WEBHOOK }}
