
# ========== 业务提交接口 - 正向正常流程 ==========

- name: 提交补充信息-正常
  path: /jdy/apply/api/v1/business/submit/supplyInfo
  method: POST
  body:
    applyId: "865634306742032147"
    applyPageCode: "SUPPLY_PAGE"
    area: "北京市-市辖区-东城区"
    address: "5YyX5Lqs5biC5rW35reA5Yy65Lit5YWz5p2R5aSn6KGXMeWPtw=="
    marriage: "未婚"
    education: "硕士及以上"
    companyName: "4124"
    workType: "国家机关、党群组织、企业、事业单位负责人"
    yearPackage: "41"
    funderSupplySubmitInfo:
      industry: "房地产业"
      companyAddress: "1241"
      customerRelativeInfos:
        - index: 1
          name: "张三"
          relationship: "父母"
          mobile: "16634543535"
          idNo: ""
        - index: 2
          name: "李四"
          relationship: "同事"
          mobile: "18857567575"
          idNo: ""
  expect_code: 200

- name: 提交签约-正常
  path: /jdy/apply/api/v1/business/submit/sign
  method: POST
  body:
    applyId: "865634306742032147"
  expect_code: 200

- name: 计算月供-正常
  path: /jdy/apply/api/v1/business/monthlySupply
  method: POST
  body:
    limitAmt: "50490"
    loanTerm: 36
  expect_code: 200
  expect_success: true
  expect_code_body: 0
  expect_data_not_null: true

