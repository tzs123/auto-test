# ========== 业务提交接口 - 安全/性能/兼容性 ==========

- name: 提交评估-applyId含SQL注入
  path: /jdy/apply/api/v1/business/submit/evaluate
  method: POST
  body:
    applyId: "' OR 1=1 --"
    phone: "MTM4MDAxMjM0NTY="
    captcha: "124214"
    carNumber: "5LqsQTEyMzQ1"
  expect_code: 200
  expect_success: false

- name: 计算月供-金额含特殊字符
  path: /jdy/apply/api/v1/business/monthlySupply
  method: POST
  body:
    limitAmt: "abc"
    loanTerm: 36
  expect_code: 200
  expect_success: false
