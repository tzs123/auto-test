# ========== 查询接口 - 反向异常入参 ==========

- name: 查询签约前信息-applyId不存在
  path: /jdy/apply/api/v1/query/preSign/999999999999999999
  method: GET
  expect_code: 200
  expect_success: false

- name: 查询补充信息-applyId不存在
  path: /jdy/apply/api/v1/query/supplyInfo/999999999999999999
  method: GET
  expect_code: 200
  expect_success: false

- name: 查询贷款信息-applyId不存在
  path: /jdy/apply/api/v1/query/loan
  method: GET
  params:
    applyId: "999999999999999999"
  expect_code: 200
  expect_success: false

# ========== 查询接口 - 边界极值 ==========

- name: 查询签约前信息-applyId为1位
  path: /jdy/apply/api/v1/query/preSign/1
  method: GET
  expect_code: 200

- name: 查询贷款信息-applyId为空
  path: /jdy/apply/api/v1/query/loan
  method: GET
  params:
    applyId: ""
  expect_code: 200

# ========== 查询接口 - 非法参数 ==========

- name: 查询签约前信息-applyId含特殊字符
  path: /jdy/apply/api/v1/query/preSign/abc
  method: GET
  expect_code: 200
  expect_success: false

- name: 查询贷款信息-applyId含SQL注入
  path: /jdy/apply/api/v1/query/loan
  method: GET
  params:
    applyId: "' OR 1=1 --"
  expect_code: 200
  expect_success: false

